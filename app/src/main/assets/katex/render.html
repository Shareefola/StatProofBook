<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<link rel="stylesheet" href="katex.min.css">
<script defer src="katex.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow: hidden; width: 100%; }
  .katex-container {
    padding: 4px 8px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 40px;
    width: 100%;
    overflow-x: auto;
  }
</style>
</head>
<body>
<div class="katex-container" id="math"></div>
<script>
window.onload = function() {
  try {
    katex.render(window.LATEX || "", document.getElementById("math"), {
      displayMode: true, throwOnError: false, strict: false
    });
  } catch(e) {
    document.getElementById("math").textContent = e.message;
  }
};
</script>
</body>
</html>
