name: StatProof Android CI/CD

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'
  GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8'

jobs:
  # ── Static Analysis ───────────────────────────────────────────────────────────
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-cleanup: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run ktlint
        run: ./gradlew ktlintCheck --continue
        continue-on-error: false

      - name: Run detekt
        run: ./gradlew detekt --continue
        continue-on-error: false

      - name: Upload detekt reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          path: '**/build/reports/detekt/**'
          retention-days: 7

  # ── Unit Tests ────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test --continue

      - name: Generate test reports
        if: always()
        run: ./gradlew testReport || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: '**/build/reports/tests/**'
          retention-days: 7

      - name: Upload test XML results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-xml
          path: '**/build/test-results/**/*.xml'
          retention-days: 7

  # ── Android Lint ──────────────────────────────────────────────────────────────
  android-lint:
    name: Android Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Android lint
        run: ./gradlew lint

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: '**/build/reports/lint-results*'
          retention-days: 7

  # ── Release Build & Sign ──────────────────────────────────────────────────────
  build-release:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [static-analysis, unit-tests, android-lint]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-cleanup: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore from GitHub Secret
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Decoding keystore..."
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/statproof-release.jks"
            echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/statproof-release.jks" >> $GITHUB_ENV
            echo "Keystore decoded successfully."
          else
            echo "WARNING: ANDROID_KEYSTORE_BASE64 secret not set. Building unsigned APK."
          fi

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Verify APK was produced
        run: |
          APK_PATH=$(find . -name "*.apk" -path "*/release/*" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No release APK found!"
            exit 1
          fi
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "Found APK: $APK_PATH"
          ls -lh "$APK_PATH"

      - name: Align APK (zipalign)
        run: |
          ZIPALIGN=$(find $ANDROID_HOME -name "zipalign" | head -1)
          if [ -n "$ZIPALIGN" ] && [ -n "$APK_PATH" ]; then
            ALIGNED_APK="${APK_PATH%.apk}-aligned.apk"
            "$ZIPALIGN" -v 4 "$APK_PATH" "$ALIGNED_APK" || true
            echo "ALIGNED_APK=$ALIGNED_APK" >> $GITHUB_ENV
          fi

      - name: Upload unsigned/signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: statproof-release-apk
          path: |
            **/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: '**/build/reports/**'
          retention-days: 7

      - name: Secure cleanup of keystore
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/statproof-release.jks" ]; then
            shred -u "$RUNNER_TEMP/statproof-release.jks" 2>/dev/null || rm -f "$RUNNER_TEMP/statproof-release.jks"
            echo "Keystore file securely deleted."
          fi

  # ── Summary ───────────────────────────────────────────────────────────────────
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [static-analysis, unit-tests, android-lint, build-release]
    if: always()

    steps:
      - name: Report CI result
        run: |
          echo "## StatProof CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Static Analysis | ${{ needs.static-analysis.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Android Lint | ${{ needs.android-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release Build | ${{ needs.build-release.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ needs.build-release.result }}" == "success" ]]; then
            echo "✅ **Release APK built successfully.** Download from artifacts." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Build failed. See job logs for details.**" >> $GITHUB_STEP_SUMMARY
          fi
